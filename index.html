<!DOCTYPE html>
<html lang="ru" class="scroll-smooth snap-y snap-mandatory h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Name Is Alexander | Interactive Psychological Thriller</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%200%20100%20100%22><rect width=%22100%22 height=%22100%22 fill=%22%231c2541%22/><text y=%2270%22 x=%2250%22 font-family=%22Courier New%22 font-size=%2260%22 font-weight=%22bold%22 fill=%22%23f4f1de%22 text-anchor=%22middle%22>A</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sovietBlue: '#1c2541',
            sovietPaper: '#f4f1de',
            sovietInk: '#0b0c10',
            sovietRed: '#9e2a2b'
          },
          fontFamily: {
            mono: ['Courier Prime', 'monospace'],
            serif: ['Playfair Display', 'serif']
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color:#f4f1de;
      color:#0b0c10;
      background-image:
        linear-gradient(rgba(11,12,16,.02) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, rgba(27,37,65,.02), rgba(11,12,16,.05));
      background-size:100% 20px,100% 100%;
      perspective:1400px;
      position:relative;
    }
    body::before {
      content:"";
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      opacity:.06;
      pointer-events:none;
      z-index:-1;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#f4f1de; }
    ::-webkit-scrollbar-thumb { background:#1c2541; }

    .film-strip-bg::before,.film-strip-bg::after {
      content:"□  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □  □";
      position:absolute;
      left:0;
      width:200%;
      font-family:monospace;
      font-size:11px;
      letter-spacing:16px;
      color:#1c2541;
      white-space:nowrap;
    }
    .film-strip-bg::before { top:4px; }
    .film-strip-bg::after { bottom:4px; }

    .film-scroller {
      display:flex;
      gap:40px;
      width:max-content;
      animation:moveStripContinuous 45s linear infinite;
    }
    @keyframes moveStripContinuous {
      0% { transform:translateX(0); }
      100% { transform:translateX(calc(-50% - 20px)); }
    }

    .snap-section {
      height:100vh;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      scroll-snap-align:start;
      scroll-snap-stop:always;
      position:relative;
      overflow:hidden;
      opacity:.2;
      transform:scale(.98);
      filter:grayscale(30%) blur(1px);
      transition:transform .9s cubic-bezier(.25,1,.5,1),opacity .8s cubic-bezier(.25,1,.5,1),filter .8s ease;
    }
    .snap-section.is-active {
      opacity:1;
      transform:scale(1);
      filter:grayscale(0%) blur(0);
    }

    .paper-container {
      position:relative;
      background:#fdfbf7;
      box-shadow:0 1px 3px rgba(0,0,0,.1),0 10px 30px rgba(11,12,16,.08),inset 0 0 40px rgba(0,0,0,.02);
      border:1px solid rgba(28,37,65,.15);
      transition:all 1s cubic-bezier(.4,0,.2,1);
      transform-style:preserve-3d;
    }
    .stamp-red {
      border:3px double #9e2a2b;
      color:#9e2a2b;
      font-family:'Courier Prime',monospace;
      font-weight:bold;
      text-transform:uppercase;
      transform:rotate(-12deg);
      opacity:.85;
      background:rgba(244,241,222,.4);
    }

    .language-switch button {
      border:1px solid rgba(28,37,65,.22);
      background:rgba(253,251,247,.58);
      color:rgba(11,12,16,.56);
    }
    .language-switch button.is-selected {
      background:#1c2541;
      color:#f4f1de;
      border-color:#1c2541;
    }

    .hero-screen-loop {
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }
    .hero-screen-loop::after {
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(rgba(244,241,222,.74),rgba(244,241,222,.8)),
        radial-gradient(circle at 50% 35%,transparent 0%,rgba(11,12,16,.18) 100%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='filmgrain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23filmgrain)' opacity='0.45'/%3E%3C/svg%3E");
      mix-blend-mode:multiply;
    }
    .hero-slide {
      position:absolute;
      width:min(46vw,520px);
      min-width:280px;
      aspect-ratio:16/9;
      border:1px solid rgba(28,37,65,.2);
      background:
        linear-gradient(135deg,rgba(28,37,65,.85),rgba(11,12,16,.86)),
        repeating-linear-gradient(0deg,rgba(244,241,222,.14) 0 1px,transparent 1px 11px);
      box-shadow:0 24px 65px rgba(11,12,16,.16);
      filter:sepia(.86) grayscale(.38) contrast(.82) brightness(1.12);
      opacity:0;
      animation:heroSlideFade 18s infinite;
    }
    .hero-slide:nth-child(1) { left:-4vw; top:18vh; --r:-8deg; transform:rotate(var(--r)); }
    .hero-slide:nth-child(2) { right:-6vw; top:25vh; --r:6deg; transform:rotate(var(--r)); animation-delay:6s; }
    .hero-slide:nth-child(3) { left:26vw; bottom:8vh; --r:-2deg; transform:rotate(var(--r)); animation-delay:12s; }
    .hero-slide::before {
      content:"";
      position:absolute;
      inset:14%;
      border:1px solid rgba(244,241,222,.22);
      background:
        linear-gradient(90deg,transparent 0 8%,rgba(244,241,222,.2) 8% 9%,transparent 9% 100%),
        repeating-linear-gradient(0deg,rgba(244,241,222,.16) 0 2px,transparent 2px 18px);
    }
    .hero-slide::after {
      content:attr(data-caption);
      position:absolute;
      left:18px;
      bottom:14px;
      color:rgba(244,241,222,.68);
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }
    @keyframes heroSlideFade {
      0%,100% { opacity:0; transform:translateY(18px) scale(.96) rotate(var(--r,0deg)); }
      10%,30% { opacity:.42; transform:translateY(0) scale(1) rotate(var(--r,0deg)); }
      42% { opacity:0; transform:translateY(-16px) scale(1.02) rotate(var(--r,0deg)); }
    }
  </style>
</head>

<body class="h-full overflow-y-scroll overflow-x-hidden m-0 font-mono" x-data="landingApp()" x-init="initScrollObserver()" :lang="lang">
  <div class="fixed right-6 top-1/2 -translate-y-1/2 z-50 flex flex-col gap-4 bg-sovietBlue/5 p-3 rounded-full backdrop-blur-sm border border-sovietBlue/10">
    <template x-for="(sec, idx) in totalSections" :key="idx">
      <button @click="scrollToSection(idx)" class="w-3 h-3 rounded-full border transition-all duration-300 relative group" :class="currentSection === idx ? 'bg-sovietRed border-sovietRed scale-125' : 'bg-transparent border-sovietBlue/40 hover:border-sovietBlue scale-100'" :title="t('nav.goTo') + ' ' + (idx + 1)">
        <span class="absolute right-6 top-1/2 -translate-y-1/2 bg-sovietBlue text-sovietPaper text-[10px] uppercase tracking-wider px-2 py-0.5 rounded opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap font-mono" x-text="sectionNames[idx]"></span>
      </button>
    </template>
  </div>

  <header class="fixed top-0 left-0 w-full z-40 bg-sovietPaper/80 backdrop-blur-sm border-b border-sovietBlue/10 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-4">
      <div class="language-switch flex gap-1 text-[10px] font-bold tracking-widest">
        <button @click="setLang('ru')" class="px-2 py-1 transition-colors duration-200" :class="{ 'is-selected': lang === 'ru' }">RU</button>
        <button @click="setLang('en')" class="px-2 py-1 transition-colors duration-200" :class="{ 'is-selected': lang === 'en' }">EN</button>
      </div>
      <div class="font-bold tracking-widest text-sovietBlue text-sm">
        RTS STUDIO <span class="text-sovietRed">//</span> <span x-text="t('header.memo')"></span>
      </div>
    </div>
    <nav class="hidden md:flex gap-8 text-xs font-bold tracking-wider">
      <button @click="scrollToSection(1)" class="hover:text-sovietRed transition-colors uppercase" x-text="t('nav.plot')"></button>
      <button @click="scrollToSection(2)" class="hover:text-sovietRed transition-colors uppercase" x-text="t('nav.paths')"></button>
      <button @click="scrollToSection(3)" class="hover:text-sovietRed transition-colors uppercase" x-text="t('nav.tape')"></button>
      <button @click="scrollToSection(4)" class="hover:text-sovietRed transition-colors uppercase" x-text="t('nav.dossiers')"></button>
      <button @click="scrollToSection(5)" class="hover:text-sovietRed transition-colors uppercase" x-text="t('nav.bureau')"></button>
    </nav>
  </header>

  <section id="sec-0" class="snap-section first-section-clear !opacity-100 !scale-100 !filter-none pt-16">
    <div class="hero-screen-loop">
      <div class="hero-slide" data-caption="DONETSK_BUILD_01"></div>
      <div class="hero-slide" data-caption="ORPHANAGE_CORRIDOR"></div>
      <div class="hero-slide" data-caption="ARCHIVE_ROOM_NIGHT"></div>
    </div>
    <div class="max-w-4xl text-center px-4 relative z-10">
      <div class="text-xs tracking-[0.3em] uppercase text-sovietRed font-bold mb-4" x-text="t('hero.kicker')"></div>
      <h1 class="font-serif text-5xl md:text-7xl text-sovietBlue mb-2 italic select-none">My Name Is Alexander</h1>
      <p class="text-sm tracking-widest uppercase text-sovietInk/60 mb-12" x-text="t('hero.subtitle')"></p>
      <div class="border-y border-sovietBlue/20 py-6 max-w-xl mx-auto my-8 text-xs md:text-sm leading-relaxed text-left text-sovietInk/80 relative">
        <div class="absolute -top-3 left-6 bg-sovietPaper px-2 text-[10px] uppercase tracking-wider font-bold text-sovietBlue" x-text="t('hero.teletype')"></div>
        <span x-text="t('hero.message')"></span>
      </div>
      <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center items-center">
        <button @click="scrollToSection(1)" class="bg-sovietBlue text-sovietPaper hover:bg-sovietRed px-6 py-3 text-xs uppercase font-bold tracking-widest transition-colors duration-300 shadow-md" x-text="t('hero.openCase')"></button>
        <button class="border border-sovietBlue/40 text-sovietBlue hover:border-sovietRed hover:text-sovietRed px-6 py-3 text-xs uppercase font-bold tracking-widest transition-colors duration-300 bg-sovietPaper/60 shadow-sm" x-text="t('hero.requestAccess')"></button>
        <div class="text-[10px] tracking-wider text-sovietInk/40 uppercase" x-text="t('hero.launch')"></div>
      </div>
    </div>
    <div class="absolute bottom-6 text-[10px] tracking-widest text-sovietInk/30 animate-pulse uppercase">
      <span x-text="t('hero.scroll')"></span> ▼
    </div>
  </section>

  <section id="sec-1" class="snap-section">
    <div class="paper-container w-[92%] max-w-3xl p-8 md:p-12 rotate-1">
      <div class="absolute top-4 right-6 stamp-red px-3 py-1 text-xs" x-text="t('plot.stamp')"></div>
      <div class="text-[10px] text-sovietBlue/60 uppercase tracking-widest mb-6 font-bold" x-text="t('plot.doc')"></div>
      <h2 class="font-serif text-3xl text-sovietBlue mb-6" x-text="t('plot.title')"></h2>
      <div class="space-y-4 text-xs md:text-sm text-sovietInk/90 leading-relaxed max-w-2xl">
        <p x-text="t('plot.p1')"></p>
        <p x-text="t('plot.p2')"></p>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-sovietBlue/10 text-[11px]">
        <div>
          <span class="block font-bold text-sovietRed uppercase tracking-wider" x-text="t('plot.feature1Title')"></span>
          <span class="text-sovietInk/60" x-text="t('plot.feature1Text')"></span>
        </div>
        <div>
          <span class="block font-bold text-sovietRed uppercase tracking-wider" x-text="t('plot.feature2Title')"></span>
          <span class="text-sovietInk/60" x-text="t('plot.feature2Text')"></span>
        </div>
      </div>
    </div>
  </section>

  <section id="sec-2" class="snap-section" x-data="{ activePath: 0 }">
    <div class="w-[94%] max-w-4xl grid md:grid-cols-12 gap-6 items-center px-4">
      <div class="md:col-span-7 paper-container p-8 min-h-[380px] flex flex-col justify-between -rotate-1">
        <div>
          <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] font-bold uppercase tracking-widest text-sovietInk/40" x-text="t('paths.system')"></span>
            <div class="stamp-red text-[9px] px-2 py-0.5 tracking-tight" x-text="t('paths.level') + ': 0' + (activePath + 1)"></div>
          </div>
          <template x-for="(path, idx) in paths" :key="idx">
            <div x-show="activePath === idx" x-transition:enter="transition ease-out duration-300" class="space-y-3">
              <h3 class="font-serif text-2xl" :class="path.color" x-text="t(path.title)"></h3>
              <p class="text-xs md:text-sm text-sovietInk/80 leading-relaxed" x-text="t(path.p1)"></p>
              <p class="text-xs md:text-sm text-sovietInk/70 leading-relaxed" x-text="t(path.p2)"></p>
              <div class="text-[11px] border-l-2 p-2 font-mono" :class="path.noteClass" x-text="t(path.note)"></div>
            </div>
          </template>
        </div>
        <div class="mt-6 pt-4 border-t border-sovietBlue/10 text-[10px] text-sovietInk/40 uppercase tracking-widest" x-text="t('paths.model')"></div>
      </div>
      <div class="md:col-span-5 flex flex-col gap-3">
        <template x-for="(path, idx) in paths" :key="idx">
          <button @click="activePath = idx" class="w-full text-left p-4 border transition-all duration-300 flex items-center justify-between" :class="activePath === idx ? path.activeClass : 'bg-fdfbf7 text-sovietInk/70 border-sovietBlue/10 hover:bg-sovietPaper/50'">
            <span x-text="t(path.button)"></span><span>→</span>
          </button>
        </template>
      </div>
    </div>
  </section>

  <section id="sec-3" class="snap-section film-strip-bg bg-sovietInk py-12 text-sovietPaper flex flex-col justify-center select-none">
    <div class="w-full max-w-5xl mx-auto px-6 z-10">
      <div class="mb-8">
        <span class="text-xs text-sovietRed font-bold tracking-[0.2em] uppercase block mb-1" x-text="t('sound.kicker')"></span>
        <h2 class="font-serif text-3xl md:text-4xl italic text-sovietPaper" x-text="t('sound.title')"></h2>
        <p class="text-xs text-sovietPaper/50 max-w-xl mt-2 font-mono" x-text="t('sound.text')"></p>
      </div>
      <div class="overflow-hidden border-y border-sovietPaper/20 py-6 relative my-4 bg-black/30">
        <div class="film-scroller">
          <template x-for="track in [...tracks, ...tracks]" :key="track.id + Math.random()">
            <div class="w-48 h-28 bg-neutral-900 border border-neutral-700 p-3 flex flex-col justify-between shrink-0">
              <span class="text-[9px] tracking-widest text-neutral-500 uppercase font-mono" x-text="track.code"></span>
              <span class="text-xs font-serif italic text-neutral-300" x-text="t(track.title)"></span>
              <span class="text-[9px] text-neutral-500 font-mono" x-text="t(track.mood)"></span>
            </div>
          </template>
        </div>
      </div>
      <div class="mt-6 text-[10px] font-mono text-neutral-500 text-right uppercase tracking-widest" x-text="t('sound.target')"></div>
    </div>
  </section>

  <section id="sec-4" class="snap-section">
    <div class="w-[94%] max-w-6xl paper-container p-6 md:p-8 rotate-1 transition-all duration-300 max-h-[82vh] overflow-y-auto">
      <div class="border-b-2 border-sovietBlue/30 pb-4 mb-6 flex justify-between items-start">
        <div>
          <div class="text-[13px] font-bold tracking-wider text-sovietBlue uppercase" x-text="t('chars.archive')"></div>
          <h2 class="text-xl font-mono font-bold uppercase tracking-widest text-sovietRed mt-1" x-text="t('chars.title')"></h2>
        </div>
        <div class="text-right font-mono text-xs text-sovietInk/50">
          <div x-text="t('chars.caseNo')"></div>
          <div x-text="t('chars.records')"></div>
        </div>
      </div>

      <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        <template x-for="i in 21" :key="i">
          <article class="bg-fdfbf7 border border-sovietBlue/10 p-4 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-md">
            <div class="flex gap-4 items-start">
              <div class="shrink-0">
                <div class="w-20 h-24 bg-sovietBlue/10 border-2 border-dashed border-sovietBlue/40 relative flex flex-col items-center justify-center p-1 bg-white shadow-inner">
                  <div class="w-full h-full bg-neutral-800 flex items-center justify-center text-[9px] text-sovietPaper/60 font-mono text-center px-1 uppercase tracking-tighter" x-text="characters[i - 1].id + '_PHOTO'"></div>
                  <div class="absolute -top-2 left-3 w-2.5 h-6 bg-neutral-400/70 border border-neutral-600 rounded-full opacity-80 transform -rotate-12"></div>
                </div>
                <div class="text-center text-[8px] uppercase tracking-wider text-sovietRed mt-2 font-bold font-mono" x-text="t('chars.attached')"></div>
              </div>
              <div class="font-mono text-[10px] space-y-1 text-sovietInk/90 w-full min-w-0">
                <div><span class="font-bold text-sovietBlue uppercase tracking-wider block" x-text="t('chars.fullName')"></span><span class="border-b border-sovietBlue/20 pb-0.5 inline-block max-w-full truncate" x-text="characters[i - 1].name"></span></div>
                <div><span class="font-bold text-sovietBlue uppercase tracking-wider block" x-text="t('chars.designation')"></span><span class="border-b border-sovietBlue/20 pb-0.5 inline-block max-w-full truncate" x-text="characters[i - 1].role"></span></div>
                <div><span class="font-bold text-sovietBlue uppercase tracking-wider block" x-text="t('chars.status')"></span><span class="text-sovietRed font-bold font-mono" x-text="characters[i - 1].status"></span></div>
              </div>
            </div>
            <div class="pt-3 mt-3 border-t border-sovietBlue/10">
              <span class="block font-bold text-sovietBlue uppercase tracking-wider mb-1 text-[10px]" x-text="t('chars.brief')"></span>
              <p class="text-sovietInk/80 leading-relaxed bg-neutral-50/50 p-3 border border-sovietBlue/10 rounded-sm italic font-mono text-[10px]" x-text="characters[i - 1].desc"></p>
            </div>
          </article>
        </template>
      </div>
    </div>
  </section>

  <section id="sec-5" class="snap-section">
    <div class="w-[92%] max-w-3xl paper-container p-8 md:p-12 rotate-[-0.5deg]">
      <div class="absolute top-4 right-6 text-[10px] font-bold text-sovietRed tracking-[0.2em] uppercase" x-text="t('team.protocol')"></div>
      <div class="text-[10px] text-sovietBlue/60 uppercase tracking-widest mb-6 font-bold" x-text="t('team.doc')"></div>
      <h2 class="font-serif text-3xl text-sovietBlue mb-2" x-text="t('team.title')"></h2>
      <p class="text-xs text-sovietInk/60 mb-8 max-w-xl" x-text="t('team.text')"></p>

      <div class="grid md:grid-cols-12 gap-6 items-start">
        <div class="md:col-span-4 flex md:flex-col gap-2 overflow-x-auto md:overflow-x-visible pb-2 md:pb-0">
          <template x-for="(member, idx) in team" :key="idx">
            <button @click="selectTeam(idx)" class="text-left px-3 py-2 text-xs uppercase tracking-wider font-mono border-l-2 shrink-0 transition-all duration-200" :class="teamIndex === idx ? 'border-sovietRed text-sovietRed font-bold bg-sovietBlue/5' : 'border-sovietBlue/10 text-sovietInk/60 hover:text-sovietBlue'">
              <span x-text="member.name"></span>
            </button>
          </template>
        </div>
        <div class="md:col-span-8 bg-fdfbf7 border border-sovietBlue/10 p-5 min-h-[160px] relative transition-opacity duration-200" :class="{ 'opacity-30': teamAnimating }">
          <div class="text-[10px] font-mono text-sovietRed font-bold uppercase tracking-widest mb-1" x-text="team[teamIndex].role"></div>
          <h4 class="font-serif text-xl text-sovietBlue mb-3" x-text="team[teamIndex].name"></h4>
          <p class="text-xs text-sovietInk/80 leading-relaxed font-mono" x-text="team[teamIndex].bio"></p>
        </div>
      </div>

      <div class="mt-8 pt-4 border-t border-sovietBlue/10 flex justify-between items-center text-[10px] text-sovietInk/40 font-mono">
        <span>SYSTEM: RNP_CORE_V8</span>
        <span x-text="t('team.status')"></span>
      </div>
    </div>

        },

        t(path) {
          return path.split('.').reduce((node, key) => node && node[key], this.translations[this.lang]) || path;
        },

        scrollToSection(index) {
          const target = document.getElementById('sec-' + index);
          if (target) {
            target.scrollIntoView({ behavior:'smooth' });
            this.currentSection = index;
          }
        },

        selectTeam(index) {
          if (this.teamAnimating || this.teamIndex === index) return;
          this.teamAnimating = true;
          setTimeout(() => {
            this.teamIndex = index;
            this.teamAnimating = false;
          }, 200);
        },

        initScrollObserver() {
          const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('is-active');
                const idStr = entry.target.getAttribute('id');
                if (idStr && idStr.startsWith('sec-')) {
                  this.currentSection = parseInt(idStr.replace('sec-', ''), 10);
                }
              } else {
                if (!entry.target.classList.contains('first-section-clear')) {
                  entry.target.classList.remove('is-active');
                }
              }
            });
          }, {
            threshold: .3,
            rootMargin: '-10% 0px -10% 0px'
          });

          document.querySelectorAll('.snap-section').forEach(sec => {
            sectionObserver.observe(sec);
          });
        }
      }
    }
  </script>
</body>
</html>
